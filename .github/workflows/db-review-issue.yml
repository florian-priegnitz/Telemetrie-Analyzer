name: AI-Endpoint-DB Monthly Review Issue

# Erzeugt jeden 2. des Monats ein Review-Issue gemaess
# .github/ISSUE_TEMPLATE/db_review.yml. Laeuft einen Tag nach
# endpoint-db-update.yml, damit der Refresh-PR (falls einer entsteht)
# beim Review-Termin schon zur Pruefung bereitliegt.

on:
  schedule:
    - cron: "0 7 2 * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  create-issue:
    name: Create monthly DB-Review issue
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Compute review month
        id: date
        run: echo "month=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Generate issue body
        id: body
        run: |
          {
            echo 'BODY<<EOF'
            python -c "
          from datetime import date
          from src.database.ai_endpoints import AIEndpointDatabase

          db = AIEndpointDatabase()
          today = date.today().isoformat()
          print(f'## Monatlicher Review — {today}')
          print('')
          print(f'**DB-Stand:** v{db.version}, last_updated {db.last_updated}, {len(db.endpoints)} Endpoints.')
          print('')
          print('Bitte das Issue gemaess der Checkliste in')
          print('[\`.github/ISSUE_TEMPLATE/db_review.yml\`](../blob/main/.github/ISSUE_TEMPLATE/db_review.yml)')
          print('manuell durchgehen. Die Checkliste rendert beim manuellen Issue-Erstellen via UI;')
          print('dieser Auto-Issue dient als Reminder + Tracking-Anker.')
          print('')
          print('### Quick-Stats')
          from collections import Counter
          cats = Counter(e.category for e in db.endpoints)
          providers = Counter(e.provider for e in db.endpoints)
          print(f'- Kategorien: {len(cats)}')
          print(f'- Provider: {len(providers)}')
          risk = Counter(e.risk_level for e in db.endpoints)
          print(f'- Risk-Verteilung: ' + ' / '.join(f'{k}: {v}' for k, v in risk.most_common()))
          print('')
          print('Coverage-Report: [\`docs/AI_COVERAGE.md\`](../blob/main/docs/AI_COVERAGE.md).')
          "
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create review issue
        uses: imjohnbo/issue-bot@v3
        with:
          title: "[DB-Review] Monatlicher AI-Endpoint-Check für ${{ steps.date.outputs.month }}"
          labels: "epic:endpoint-db, documentation, priority:P2"
          body: ${{ steps.body.outputs.BODY }}
          token: ${{ secrets.GITHUB_TOKEN }}
