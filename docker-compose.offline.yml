# Offline-AI-Setup: Telemetrie-Analyzer + Ollama als Sidecar.
#
# Aktivierung via Compose-Profile (Standard-Compose bleibt unbeeinflusst):
#   docker compose --profile offline up -d
#   docker compose --profile offline exec ollama ollama pull llama3.1:8b
#   curl http://localhost:11434/api/tags
#
# Stoppen:
#   docker compose --profile offline down
#
# Hintergrund: docs/OFFLINE_AI.md
services:
  telemetrie-analyzer:
    profiles: ["offline"]
    build: .
    image: telemetrie-analyzer:latest
    container_name: telemetrie-analyzer-offline
    ports:
      - "8501:8501"
    environment:
      - LLM_BACKEND=ollama
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:8b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
      - REPORT_SALT=${REPORT_SALT:-}
      - PSEUDONYM_SALT=${PSEUDONYM_SALT:-}
    volumes:
      - ./reports:/app/reports
      - ./uploads:/app/uploads:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  ollama:
    profiles: ["offline"]
    image: ollama/ollama:0.4.7
    container_name: telemetrie-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      # /api/tags ist der leichtgewichtige Health-Endpoint von Ollama.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  ollama-data:
    name: telemetrie-ollama-data
