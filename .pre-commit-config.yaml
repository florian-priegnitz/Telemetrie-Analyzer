# Pre-Commit-Hooks — ausführen lokal via `pre-commit install`
# Dokumentation: https://pre-commit.com/

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^(\.github/workflows/|src/reports/templates/)
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        stages: [manual]

  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.9"
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-lll"]
        additional_dependencies: ["bandit[toml]"]

  - repo: local
    hooks:
      - id: schema-validate
        name: validate ai_endpoints schema
        language: system
        entry: python3 -m src.database.ai_endpoints --validate
        pass_filenames: false
        files: ^data/ai_endpoints\.json$
